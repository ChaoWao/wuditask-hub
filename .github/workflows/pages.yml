name: Deploy WudiTask Pages

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "hub.json"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'schedule' || vars.WUDITASK_PAGES_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out task Hub
        uses: actions/checkout@v6
        with:
          path: hub
      - name: Check out pinned WudiTask tool
        uses: actions/checkout@v6
        with:
          repository: ChaoWao/wuditask
          ref: 8cbb9ae1b88c0728552f3629d7776bc36c68a360
          path: tool
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate task data
        run: python3 tool/tools/wuditask.py --hub hub --local --json validate
      - name: Build static dashboard
        run: python3 tool/tools/wuditask.py --hub hub --local --json build-site --output "$GITHUB_WORKSPACE/_site"
      - name: Configure Pages
        if: vars.WUDITASK_PAGES_ENABLED == 'true'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: vars.WUDITASK_PAGES_ENABLED == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: vars.WUDITASK_PAGES_ENABLED == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
