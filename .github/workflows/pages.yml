name: Deploy WudiTask Pages

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "hub.json"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "17 * * * *"
  issues:
    types: [opened, edited, assigned, unassigned, closed, reopened]
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - assigned
      - unassigned
      - ready_for_review
      - converted_to_draft
      - closed
      - reopened
  workflow_dispatch:

permissions:
  checks: read
  contents: read
  issues: read
  pages: write
  pull-requests: read
  statuses: read
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name != 'schedule' || vars.WUDITASK_PAGES_ENABLED == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.WUDITASK_GITHUB_TOKEN || github.token }}
    steps:
      - name: Check out task Hub
        uses: actions/checkout@v6
        with:
          # Pages builds only the committed default-branch Hub snapshot.
          ref: ${{ github.event.repository.default_branch }}
          path: hub
          persist-credentials: false
      - name: Check out pinned WudiTask tool
        uses: actions/checkout@v6
        with:
          repository: ChaoWao/wuditask
          ref: c7bdc8e3382331ca4703963dad5f61b50699bd73
          path: tool
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate task data
        run: python3 tool/tools/wuditask.py --hub hub --local --json validate
      - name: Build static dashboard
        run: python3 tool/tools/wuditask.py --hub hub --local --json build-site --output "$GITHUB_WORKSPACE/_site"
      - name: Configure Pages
        if: vars.WUDITASK_PAGES_ENABLED == 'true'
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: vars.WUDITASK_PAGES_ENABLED == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    if: vars.WUDITASK_PAGES_ENABLED == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
