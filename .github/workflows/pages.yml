name: Deploy WudiTask Pages

on:
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "site/**"
      - "schemas/**"
      - "wuditask/**"
      - "tools/wuditask.py"
      - ".github/workflows/pages.yml"
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out task hub
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Validate task data
        run: python3 tools/wuditask.py --local --json validate
      - name: Build static dashboard
        run: python3 tools/wuditask.py --local --json build-site --output _site
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
